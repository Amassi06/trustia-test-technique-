<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion Produits & Factures</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    input[type="text"],
    input[type="email"],
    input[type="number"],
    input[type="date"],
    input[type="datetime-local"],
    input[type="password"],
    textarea,
    select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.375rem;
      font-size: 1rem;
      font-family: inherit;
      box-sizing: border-box;
      transition: all 0.2s ease;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="number"]:focus,
    input[type="date"]:focus,
    input[type="datetime-local"]:focus,
    input[type="password"]:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
  </style>
</head>
<body class="bg-gray-50">
  <!-- Navigation -->
  <nav class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold text-gray-900">Billing System</h1>
        <div class="flex gap-6">
          <a href="{% url 'billing:product_list' %}" class="text-gray-600 hover:text-blue-600 font-medium transition">
            Produits
          </a>
          <a href="{% url 'billing:invoice_list' %}" class="text-gray-600 hover:text-blue-600 font-medium transition">
            Factures
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="mt-16 bg-gray-800 text-gray-300 py-8 text-center">
    <p>&copy; 2024 Billing System. Tous droits réservés.</p>
  </footer>
</body>
</html>
