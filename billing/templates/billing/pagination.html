{% if page_obj and page_obj.paginator.num_pages > 1 %}
  <nav class="mt-8 flex justify-center items-center gap-2" aria-label="Pagination">
    {% if page_obj.has_previous %}
      <a href="?page=1" class="px-3 py-2 bg-white border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 font-medium transition">
        « Première
      </a>
      <a href="?page={{ page_obj.previous_page_number }}" class="px-3 py-2 bg-white border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 font-medium transition">
        Précédente
      </a>
    {% endif %}

    <div class="px-4 py-2 bg-blue-100 border border-blue-200 rounded-lg text-blue-800 font-semibold">
      Page {{ page_obj.number }} / {{ page_obj.paginator.num_pages }}
    </div>

    {% if page_obj.has_next %}
      <a href="?page={{ page_obj.next_page_number }}" class="px-3 py-2 bg-white border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 font-medium transition">
        Suivante
      </a>
      <a href="?page={{ page_obj.paginator.num_pages }}" class="px-3 py-2 bg-white border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 font-medium transition">
        Dernière »
      </a>
    {% endif %}
  </nav>
{% endif %}
