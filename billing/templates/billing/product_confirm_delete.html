{% extends 'billing/base.html' %}

{% block content %}
<div class="mb-6">
  <a href="{% url 'billing:product_list' %}" class="text-blue-600 hover:text-blue-800 font-medium">&larr; Retour aux produits</a>
</div>

<div class="bg-red-50 border border-red-200 rounded-lg p-6 max-w-md">
  <h1 class="text-2xl font-bold text-red-800 mb-4">⚠️ Confirmer la suppression</h1>
  <p class="text-gray-700 mb-6">Vous êtes sur le point de supprimer définitivement le produit <strong>"{{ object.name }}"</strong>.</p>
  <p class="text-sm text-gray-600 mb-6">Cette action est irréversible.</p>

  <form method="post" class="flex gap-4">
    {% csrf_token %}
    <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-6 rounded-lg transition">
      🗑️ Supprimer définitivement
    </button>
    <a href="{% url 'billing:product_list' %}" class="bg-gray-400 hover:bg-gray-500 text-white font-semibold py-2 px-6 rounded-lg transition">
      Annuler
    </a>
  </form>
</div>
{% endblock %}
